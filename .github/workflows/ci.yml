name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg playerctl

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[full]"

      - name: Run tests
        run: |
          bash scripts/run_tests.sh

      - name: Verify imports
        run: |
          python -c "from lrc_tools import __version__; from lrc_tools.core import IS_LINUX, IS_MACOS, IS_WINDOWS; from lrc_tools.parser import parse_lrc; from lrc_tools.processor import process_long_phrases; from lrc_tools.puller import extract_metadata_from_filename; print('OK: lrc-tools v' + __version__)"
